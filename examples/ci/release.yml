# Reference workflow: release a Lili-built CLI via the ecosystem-maintained
# publishing path. Two Lili commands do the build + package work; everything
# downstream is plain official actions.

name: release

on:
  push:
    tags: ['v*']

jobs:
  product:
    name: generate product surface
    runs-on: ubuntu-latest
    outputs:
      contract-digest: ${{ steps.generate.outputs.contract-digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - id: generate
        run: |
          bun run li-product generate src/product.ts --out dist/generated
          digest=$(jq -r .digest dist/generated/catalog.json)
          echo "contract-digest=sha256:$digest" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-surface
          path: dist/generated/

  build:
    name: compile all targets
    needs: product
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with: { name: generated-surface, path: dist/generated/ }

      # One command compiles every preset target in parallel and writes a
      # machine-readable BuildRecord that the package step consumes.
      - run: |
          bun run li-build build src/cli.ts \
            --targets all \
            --release-version "${GITHUB_REF_NAME#v}" \
            --commit "$GITHUB_SHA" \
            --contract-digest "${{ needs.product.outputs.contract-digest }}" \
            --out dist/binaries \
            --record dist/build-record.json

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/binaries/
            dist/build-record.json

  package:
    name: render ecosystem packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with: { name: build-output, path: dist/ }

      # One command renders byte-exact npm tarballs, PyPI wheels, Homebrew
      # formula, and Scoop manifest from the BuildRecord. The downstream
      # publish jobs hand each subdirectory to the matching official action.
      - run: |
          bun run li-release package dist/build-record.json \
            --subject-id workers \
            --subject-name "Workers CLI" \
            --description "Workers CLI" \
            --license MIT \
            --repository acme/workers \
            --host-repository acme/workers \
            --npm @acme/workers \
            --pypi acme-workers \
            --homebrew acme/homebrew-tap:workers \
            --scoop acme/scoop-bucket:workers \
            --out dist/release

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            dist/binaries/
            dist/release/

  github-release:
    name: github release (hosts binaries that formula + scoop manifest link to)
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-bundle, path: dist/ }

      # Homebrew formula + Scoop manifest embed the binary URLs derived from
      # --host-repository. Those URLs must resolve before publish-homebrew /
      # publish-scoop run, so we upload the binaries here first.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/binaries/**
            dist/release/manifest.json

  publish-npm:
    name: publish to npm (trusted publishing)
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-bundle, path: dist/ }
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      # Publish platform tarballs before the umbrella so optionalDependencies
      # resolve. Filenames embed the platform suffix (the umbrella is the
      # unsuffixed one), so we sort by length and rely on the umbrella being
      # the shortest matching basename.
      - run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/release/packages/npm/*.tgz)
          IFS=$'\n' sorted=($(printf '%s\n' "${tarballs[@]}" | awk '{print length, $0}' | sort -rn | cut -d' ' -f2-))
          for tarball in "${sorted[@]}"; do
            echo "::group::npm publish $tarball"
            npm publish "$tarball" --access public --provenance
            echo "::endgroup::"
          done

  publish-pypi:
    name: publish to PyPI (trusted publishing)
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-bundle, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/release/packages/pypi/

  publish-homebrew:
    name: publish to Homebrew tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          path: tap

      - uses: actions/download-artifact@v4
        with: { name: release-bundle, path: dist/ }

      - name: Commit formula to tap
        run: |
          set -euo pipefail
          cp dist/release/packages/homebrew/*.rb tap/Formula/
          cd tap
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name  "release-bot"
          git add Formula
          if git diff --cached --quiet; then
            echo "no formula changes"
            exit 0
          fi
          git commit -m "${{ github.event.repository.name }} ${GITHUB_REF_NAME#v}"
          git push

  publish-scoop:
    name: publish to Scoop bucket
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.SCOOP_BUCKET_REPO }}
          token: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          path: bucket

      - uses: actions/download-artifact@v4
        with: { name: release-bundle, path: dist/ }

      - name: Commit manifest to bucket
        run: |
          set -euo pipefail
          cp dist/release/packages/scoop/*.json bucket/bucket/
          cd bucket
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name  "release-bot"
          git add bucket
          if git diff --cached --quiet; then
            echo "no manifest changes"
            exit 0
          fi
          git commit -m "${{ github.event.repository.name }} ${GITHUB_REF_NAME#v}"
          git push
