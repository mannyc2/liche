name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation and npm publish --dry-run only"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release candidate check
        run: bun run release:check

      - name: Check package names
        run: bun run --silent release:names

      - name: Publish packages
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          args=("--access" "public")
          if [ "$DRY_RUN" = "true" ]; then
            args+=("--dry-run")
          fi

          for package_dir in packages/core packages/build packages/releases packages/product; do
            echo "Publishing ${package_dir}"
            (cd "$package_dir" && npm publish "${args[@]}")
          done
