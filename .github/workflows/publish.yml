name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation and npm publish --dry-run only"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve publish mode
        id: publish-mode
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release candidate check
        run: bun run release:check

      - name: Check package names
        run: bun run --silent release:names

      - name: Check tag matches package versions
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_dirs=(
            packages/core
            packages/extensions/auth
            packages/extensions/completions
            packages/extensions/config
            packages/extensions/mcp-installer
            packages/extensions/mcp-server
            packages/extensions/skills-installer
            packages/extensions/skills-runtime
            packages/extensions/telemetry
            packages/extensions/tokens
            packages/extensions/agents
            packages/extensions
            packages/build
            packages/releases
            packages/product
          )

          for package_dir in "${package_dirs[@]}"; do
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if [ "$package_version" != "$tag_version" ]; then
              echo "::error file=${package_dir}/package.json::Package version ${package_version} does not match tag ${GITHUB_REF_NAME}"
              exit 1
            fi
          done

      - name: Check package versions are unpublished
        if: steps.publish-mode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail

          package_dirs=(
            packages/core
            packages/extensions/auth
            packages/extensions/completions
            packages/extensions/config
            packages/extensions/mcp-installer
            packages/extensions/mcp-server
            packages/extensions/skills-installer
            packages/extensions/skills-runtime
            packages/extensions/telemetry
            packages/extensions/tokens
            packages/extensions/agents
            packages/extensions
            packages/build
            packages/releases
            packages/product
          )

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
              echo "::error file=${package_dir}/package.json::${package_name}@${package_version} is already published"
              exit 1
            fi
          done

      - name: Publish packages
        env:
          DRY_RUN: ${{ steps.publish-mode.outputs.dry_run }}
        run: |
          set -euo pipefail

          args=("--access" "public")
          if [ "$DRY_RUN" = "true" ]; then
            args+=("--dry-run")
          fi

          package_dirs=(
            packages/core
            packages/extensions/auth
            packages/extensions/completions
            packages/extensions/config
            packages/extensions/mcp-installer
            packages/extensions/mcp-server
            packages/extensions/skills-installer
            packages/extensions/skills-runtime
            packages/extensions/telemetry
            packages/extensions/tokens
            packages/extensions/agents
            packages/extensions
            packages/build
            packages/releases
            packages/product
          )

          for package_dir in "${package_dirs[@]}"; do
            echo "Publishing ${package_dir}"
            (cd "$package_dir" && npm publish "${args[@]}")
          done
